<div class="profile-container" *ngIf="profile as user; else loading">

  <h2>User Profile</h2>

  <form (ngSubmit)="updateProfile()" #profileForm="ngForm">
 
    <!-- Id -->
    <div class="form-group">
      <label>Id</label>
      <input
        type="text"
        [(ngModel)]="user.id"
        name="id"
        required
        class="form-control"
      />
    </div>

    <!-- Name -->
    <div class="form-group">
      <label>Full Name</label>
      <input
        type="text"
        [(ngModel)]="user.fullName"
        name="userName"
        required
        class="form-control"
      />
    </div>

 
    <div class="form-group">
      <label>Email</label>
      <input
        type="email"
        [(ngModel)]="user.email"
        name="email"
        class="form-control"
        readonly
      />
    </div>

 
    <!-- <div class="form-group">
      <label>Phone</label>
      <input
        type="text"
        [(ngModel)]="user.phone"
        name="phone"
        class="form-control"
      />
    </div> -->

 
    <!-- <div class="form-group">
      <label>Address</label>
      <input
        type="text"
        [(ngModel)]="user.address"
        name="address"
        class="form-control"
      />
    </div> -->

    <!-- Submit -->
    <button type="submit" [disabled]="profileForm.invalid">
      Update Profile
    </button>

  </form>
</div>

<ng-template #loading>
  <p>Loading profile...</p>
</ng-template>
